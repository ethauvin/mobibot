image: fedora:latest

variables:
  CI_NAME: "GitLab CI"

stages:
  - test

cache:
  key: "${CI_JOB_IMAGE}-lib"  # Dynamic based on image
  paths:
    - lib/
    - $HOME/.sdkman/
  policy: pull-push

before_script:
  - dnf -qy update && dnf -y install zip
  - curl -s "https://get.sdkman.io" | bash
  - echo sdkman_auto_answer=true > $HOME/.sdkman/etc/config
  - echo sdkman_auto_selfupdate=true >> $HOME/.sdkman/etc/config
  - source "$HOME/.sdkman/bin/sdkman-init.sh"
  - sdk install java
  - sdk install kotlin
  - source "$HOME/.sdkman/bin/sdkman-init.sh"

test:
  stage: test
  script:
    - ./bld clean compile
    - ./bld test || ./bld --offline reporter --all
